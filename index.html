<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#5b8cff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="google-site-verification" content="kE1Z9FXrB7vPvsthC29sSpukd-5DJm8QodvntWWcZN0" />
</head>
<body>
    <div>
        <img class="i1" src="./icon-192.png" alt="">
        <button id="install-btn" class="install-button" style="display: none; margin-top: 1.5rem; padding: 14px 28px; font-size: 1.1rem; border-radius: 50px; background: linear-gradient(90deg, #00c853, #64dd17); color: white; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,200,83,0.4);">
            Установить приложение
        </button>
    </div>
    
        <script>
            // Кастомная кнопка установки PWA
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  // Предотвращаем показ стандартного баннера
  e.preventDefault();
  // Сохраняем событие, чтобы использовать позже
  deferredPrompt = e;
  // Показываем нашу кнопку
  document.getElementById('install-btn').style.display = 'block';
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;

  // Показываем системный диалог установки
  deferredPrompt.prompt();

  // Ждём выбора пользователя
  const { outcome } = await deferredPrompt.userChoice;

  if (outcome === 'accepted') {
    console.log('Пользователь установил приложение');
  } else {
    console.log('Пользователь отказался');
  }

  // Больше не понадобится
  deferredPrompt = null;
  // Скрываем кнопку
  document.getElementById('install-btn').style.display = 'none';
});

// Если приложение уже установлено — кнопку не показываем
window.addEventListener('appinstalled', () => {
  console.log('PWA успешно установлена');
  document.getElementById('install-btn').style.display = 'none';
  deferredPrompt = null;
});
        </script>
</body>

</html>
